name: Generate ElevenLabs TTS Letters (26 x 8 voices)

on:
  workflow_dispatch:

jobs:
  tts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run ElevenLabs TTS (26 letters x 8 voices)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python gh_generate.py

      - name: Upload wav files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: elevenlabs-tts-letters-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: error
