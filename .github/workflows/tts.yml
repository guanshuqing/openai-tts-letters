name: Generate Azure TTS Letters (26 × 6 voices)

on:
  workflow_dispatch:  # 手动触发

jobs:
  tts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gh_requirements.txt

      - name: Run Azure TTS generation (26 letters × 6 voices)
        env:
          AZURE_TTS_KEY: ${{ secrets.AZURE_TTS_KEY }}
        run: python gh_generate.py

      - name: Upload wav files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-tts-letters-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: error
